name: Publish server image

# Builds the dedicated server Docker image (server/deploy/Dockerfile) and pushes
# it to GHCR so Unraid can pull + auto-update like any other container.
# Runs on published releases, on server-affecting pushes to main, and on demand.

on:
  release:
    types: [published]
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'server/**'
      - 'project.godot'
      - 'export_presets.cfg'
      - '.github/workflows/publish-server-image.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-server-image
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

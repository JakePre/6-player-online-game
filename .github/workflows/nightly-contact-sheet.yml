# Nightly render contact sheet (#933): render EVERY catalog game with practice
# bots, tile one mid-round frame each into a single labeled grid, and red-flag
# any game whose bot round ended far short of its duration (the sumo 2-second
# regression, #927, would have tripped it). Pure observability — never a
# required check, never blocks a PR. Built on tests/soak/render_game.py (the
# same honest wall-time capture render-games.yml uses).
name: Nightly contact sheet

on:
  schedule:
    - cron: "0 7 * * *" # ~07:00 UTC nightly
  workflow_dispatch:
    inputs:
      bots:
        description: "Practice bots per game"
        default: "5"
      duration:
        description: "Round duration override (seconds)"
        default: "30"

env:
  GODOT_VERSION: 4.4.1

jobs:
  list:
    name: Enumerate games
    runs-on: ubuntu-latest
    outputs:
      games: ${{ steps.enum.outputs.games }}
    steps:
      - uses: actions/checkout@v4
      - id: enum
        # Derive the roster from src/minigames/<id>/ at runtime (the #864 lesson:
        # a hardcoded list goes stale the day a game is swapped). Framework dirs
        # are underscore-prefixed (_api) and excluded.
        run: |
          games=$(ls -d src/minigames/*/ | xargs -n1 basename | grep -v '^_' | sort -u | jq -R . | jq -sc .)
          echo "games=$games" >> "$GITHUB_OUTPUT"
          echo "roster: $games"

  render:
    name: Render ${{ matrix.game }}
    needs: list
    runs-on: ubuntu-latest
    # One job per game keeps a single crash isolated; batch 4-6 per job here if
    # runner quota ever bites (the sheet job tolerates missing games either way).
    strategy:
      fail-fast: false
      matrix:
        game: ${{ fromJSON(needs.list.outputs.games) }}
    steps:
      - uses: actions/checkout@v4
      # #1121: cache the Godot binary so it isn't re-downloaded every run.
      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-bin-linux-${{ env.GODOT_VERSION }}
      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot-bin
          chmod +x godot-bin
      - name: Install xvfb + ffmpeg + software Vulkan
        # mesa-vulkan-drivers = lavapipe, the software Vulkan device Godot's
        # Forward+ renderer uses on GPU-less runners (#1119).
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xvfb ffmpeg mesa-vulkan-drivers
      - name: Import resources
        run: ./godot-bin --headless --import || true
      - name: Render + extract a mid-round frame
        run: |
          mkdir -p frames
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" \
            python3 tests/soak/render_game.py --godot ./godot-bin \
              --game "${{ matrix.game }}" \
              --bots "${{ inputs.bots || '5' }}" \
              --duration "${{ inputs.duration || '30' }}" \
              --software --out renders \
              --contact-frame "frames/${{ matrix.game }}.png" | tee out.txt
          # Turn the harness's ROUND_ELAPSED line into a "<elapsed> <duration>"
          # meta the sheet reads; default to "unknown" if the round never
          # resolved (it ran the full budget — no flag).
          line=$(grep '^ROUND_ELAPSED' out.txt | tail -1 || true)
          elapsed=$(printf '%s' "$line" | sed -n 's/.*elapsed=\([^ ]*\).*/\1/p')
          duration=$(printf '%s' "$line" | sed -n 's/.*duration=\([^ ]*\).*/\1/p')
          echo "${elapsed:-unknown} ${duration:-${{ inputs.duration || '30' }}}" \
            > "frames/${{ matrix.game }}.meta"
      - name: Upload frame + meta
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frame-${{ matrix.game }}
          path: frames/
          retention-days: 14

  sheet:
    name: Contact sheet
    needs: render
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: frame-*
          path: allframes
          merge-multiple: true
      - name: Build the sheet
        run: |
          python3 -m pip install --quiet pillow
          python3 tests/soak/contact_sheet.py --frames allframes \
            --out contact-sheet.png --summary summary.md --cols 6
          cat summary.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload contact sheet
        uses: actions/upload-artifact@v4
        with:
          name: contact-sheet
          path: contact-sheet.png
          retention-days: 30

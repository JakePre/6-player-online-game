name: Nightly playtest

# M7-03: separate from ci.yml on purpose — this is a new workflow file, not
# an edit to the locked ci.yml hotspot (docs/AGENT_COORDINATION.md §4).

on:
  schedule:
    - cron: "0 9 * * *" # 09:00 UTC nightly
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1

jobs:
  playtest:
    name: Full match playtest (server + 6 bots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # #1121: cache the Godot binary so it isn't re-downloaded every run.
      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-bin-linux-${{ env.GODOT_VERSION }}
      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot-bin
          chmod +x godot-bin
      - name: Import resources
        run: ./godot-bin --headless --import || true
      - name: Run playtest harness
        run: |
          python3 tests/soak/run_playtest.py --godot ./godot-bin --rounds 12 \
            --telemetry-out playtest-telemetry-6.json
      - name: Run mutator playtest harness (M9-06)
        run: |
          python3 tests/soak/run_playtest.py --godot ./godot-bin --rounds 12 --mutators \
            --telemetry-out playtest-telemetry-6-mutators.json
      - name: Upload balance telemetry (#548)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playtest-telemetry-6
          path: playtest-telemetry-6*.json
          if-no-files-found: ignore

  balance:
    # #560 / M12-01 precursor: full-duration matches with bots actually
    # sending inputs, at the balance pass's 2/4/6 target head counts. This is
    # the telemetry M12-01 consumes — the compressed jobs above are smoke
    # coverage whose all-tie placements carry no balance signal.
    # 48 rounds per match (#730): at the old 12, the ~45-game catalog gathered
    # ~1 observation per (game, players) cell every FOUR nights (~40 nights to
    # a usable per-game sample). 48 real-duration rounds ≈ 55 min, so the job
    # budget is 90 min and --timeout raises the bots' IN_MATCH deadline to
    # match. Backfill: re-run this job via workflow_dispatch.
    name: Balance telemetry (${{ matrix.players }} bots, real durations)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        players: [2, 4, 6]
    steps:
      - uses: actions/checkout@v4
      # #1121: cache the Godot binary so it isn't re-downloaded every run.
      - name: Cache Godot binary
        id: godot-cache
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-bin-linux-${{ env.GODOT_VERSION }}
      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" godot-bin
          chmod +x godot-bin
      - name: Import resources
        run: ./godot-bin --headless --import || true
      - name: Run balance playtest (${{ matrix.players }} players)
        run: |
          python3 tests/soak/run_playtest.py --godot ./godot-bin --rounds 48 --balance \
            --timeout 4800 \
            --players ${{ matrix.players }} \
            --telemetry-out balance-telemetry-${{ matrix.players }}.json
      - name: Upload balance telemetry (#560)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: balance-telemetry-${{ matrix.players }}
          path: balance-telemetry-${{ matrix.players }}.json
          if-no-files-found: ignore

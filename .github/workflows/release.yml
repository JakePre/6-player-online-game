# Release pipeline (M7-02): pushing a v* tag exports every preset and
# publishes the zipped builds as a GitHub Release. workflow_dispatch runs the
# export matrix only (no release), for smoke-testing without cutting a tag.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1

permissions:
  contents: write

jobs:
  build:
    name: Export ${{ matrix.preset }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: Windows Desktop
            out_dir: build/windows
            artifact: party-rush-windows
          - preset: Linux
            out_dir: build/linux
            artifact: party-rush-linux
          - preset: macOS
            out_dir: build/macos
            artifact: party-rush-macos
          - preset: Linux Server
            out_dir: build/server
            artifact: party-rush-server
          - preset: Windows Server
            out_dir: build/server-windows
            artifact: party-rush-server-windows
    steps:
      - uses: actions/checkout@v4
      - name: Make export templates visible to the runner user
        # The image stores templates under /root, but Actions containers run
        # with HOME=/github/home.
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
            ~/.local/share/godot/export_templates/
      - name: Stamp AppVersion from the release tag
        # Keeps builds honest without a manual const bump each release (#166).
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s/^const VERSION := \".*\"/const VERSION := \"$V\"/" src/client/app_version.gd
          grep "const VERSION" src/client/app_version.gd
      - name: Prepare output directory
        run: mkdir -p "${{ matrix.out_dir }}"
      - name: Import resources
        run: godot --headless --import || true
      - name: Export
        run: godot --headless --export-release "${{ matrix.preset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out_dir }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Zip each platform build
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            (cd "$name" && zip -qr "../${name}-${GITHUB_REF_NAME}.zip" .)
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md << 'EOF'
          Desktop builds for Windows, Linux, and macOS, plus the headless
          dedicated server (Linux). Unzip and run.

          **macOS:** the app is unsigned, and macOS quarantines downloads as
          "damaged" (right-click → Open is no longer enough). Clear the
          quarantine once in Terminal, then open normally:

          ```
          xattr -cr "/path/to/Party Rush.app"
          ```

          **Server:** run with `--server`, or use the Docker deploy in
          `server/deploy/` (see README there).
          EOF
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Party Rush $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes

  sync-source-version:
    # Builds are already stamped from the tag (see the export job, #166), but
    # the committed AppVersion.VERSION default used to drift release-to-release
    # because the manual bump got forgotten (it sat at 0.3.0 through five
    # releases). This best-effort job keeps main's source const honest by
    # committing the tag version back after a successful release. It never
    # fails the run: a drifted source is cosmetic, not a shipped bug.
    name: Sync source AppVersion to the released tag
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Commit the tag version back to main if it drifted
        run: |
          set -uo pipefail
          V="${GITHUB_REF_NAME#v}"
          current="$(sed -n 's/^const VERSION := "\(.*\)"/\1/p' src/client/app_version.gd)"
          if [ "$current" = "$V" ]; then
            echo "Source const already at $V — nothing to sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          for attempt in 1 2 3; do
            sed -i "s/^const VERSION := \".*\"/const VERSION := \"$V\"/" src/client/app_version.gd
            git add src/client/app_version.gd
            git commit -m "chore: sync AppVersion source const to $GITHUB_REF_NAME [skip ci]"
            if git push origin HEAD:main; then
              echo "Synced source const to $V."
              exit 0
            fi
            echo "Push race on attempt $attempt — rebasing onto main and retrying."
            git reset --soft HEAD~1
            git restore --staged src/client/app_version.gd || true
            git checkout -- src/client/app_version.gd
            git fetch origin main
            git rebase origin/main || { git rebase --abort || true; }
          done
          echo "::warning::Could not sync AppVersion source const after retries (non-fatal; builds are stamped regardless)."
          exit 0

# Release pipeline (M7-02): pushing a v* tag exports every preset and
# publishes the zipped builds as a GitHub Release. workflow_dispatch runs the
# export matrix only (no release), for smoke-testing without cutting a tag.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  GODOT_VERSION: 4.4.1

permissions:
  contents: write

jobs:
  build:
    name: Export ${{ matrix.preset }}
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    strategy:
      fail-fast: false
      matrix:
        include:
          - preset: Windows Desktop
            out_dir: build/windows
            artifact: party-rush-windows
          - preset: Linux
            out_dir: build/linux
            artifact: party-rush-linux
          - preset: macOS
            out_dir: build/macos
            artifact: party-rush-macos
          - preset: Linux Server
            out_dir: build/server
            artifact: party-rush-server
          - preset: Windows Server
            out_dir: build/server-windows
            artifact: party-rush-server-windows
    steps:
      - uses: actions/checkout@v4
      - name: Make export templates visible to the runner user
        # The image stores templates under /root, but Actions containers run
        # with HOME=/github/home.
        run: |
          mkdir -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable \
            ~/.local/share/godot/export_templates/
      - name: Stamp AppVersion from the release tag
        # Keeps builds honest without a manual const bump each release (#166).
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          V="${GITHUB_REF_NAME#v}"
          sed -i "s/^const VERSION := \".*\"/const VERSION := \"$V\"/" src/client/app_version.gd
          grep "const VERSION" src/client/app_version.gd
      - name: Prepare output directory
        run: mkdir -p "${{ matrix.out_dir }}"
      - name: Import resources
        run: godot --headless --import || true
      - name: Export
        run: godot --headless --export-release "${{ matrix.preset }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.out_dir }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Zip each platform build
        run: |
          cd dist
          for dir in */; do
            name="${dir%/}"
            (cd "$name" && zip -qr "../${name}-${GITHUB_REF_NAME}.zip" .)
          done
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > notes.md << 'EOF'
          Desktop builds for Windows, Linux, and macOS, plus the headless
          dedicated server (Linux). Unzip and run.

          **macOS:** the app is unsigned, and macOS quarantines downloads as
          "damaged" (right-click → Open is no longer enough). Clear the
          quarantine once in Terminal, then open normally:

          ```
          xattr -cr "/path/to/Party Rush.app"
          ```

          **Server:** run with `--server`, or use the Docker deploy in
          `server/deploy/` (see README there).
          EOF
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Party Rush $GITHUB_REF_NAME" \
            --notes-file notes.md \
            --generate-notes

  sync-source-version:
    # Builds are already stamped from the tag (see the export job, #166), but
    # the committed AppVersion.VERSION default used to drift release-to-release
    # because the manual bump got forgotten (it sat at 0.3.0 through five
    # releases). This best-effort job keeps main's source const honest by
    # committing the tag version back after a successful release. It never
    # fails the run: a drifted source is cosmetic, not a shipped bug.
    #
    # #565: branch protection (§12) now rejects a direct push to main, so the
    # direct push is a fast-path attempt only — on rejection this falls back
    # to pushing a side branch and opening a PR instead, which respects
    # protection. It tries to auto-merge that PR (works if the repo has
    # auto-merge enabled); if not, it leaves a clear warning with the PR link
    # for a human/agent to merge manually. Still never fails the run.
    name: Sync source AppVersion to the released tag
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Commit the tag version back to main if it drifted
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          V="${GITHUB_REF_NAME#v}"
          current="$(sed -n 's/^const VERSION := "\(.*\)"/\1/p' src/client/app_version.gd)"
          if [ "$current" = "$V" ]; then
            echo "Source const already at $V — nothing to sync."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          sed -i "s/^const VERSION := \".*\"/const VERSION := \"$V\"/" src/client/app_version.gd
          git add src/client/app_version.gd
          git commit -m "chore: sync AppVersion source const to $GITHUB_REF_NAME [skip ci]"
          if git push origin HEAD:main; then
            echo "Synced source const to $V (direct push)."
            exit 0
          fi
          echo "Direct push rejected (branch protection) — opening a PR instead (#565)."
          branch="chore/sync-version-$V"
          if ! git push --force origin "HEAD:refs/heads/$branch"; then
            echo "::warning::Could not push the sync branch $branch (non-fatal; builds are stamped regardless)."
            exit 0
          fi
          pr_url="$(gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "chore: sync AppVersion source const to $GITHUB_REF_NAME" \
            --body "Automated post-release sync (#565): keeps main's committed \`AppVersion.VERSION\` honest after $GITHUB_REF_NAME. Builds already stamp correctly from the tag regardless (#166) — this is source drift only." \
            2>/dev/null)" || {
            echo "::warning::Could not open the sync PR for $branch (it may already exist) — check the branch manually (non-fatal)."
            exit 0
          }
          echo "Opened $pr_url"
          # A PR opened by the workflow's own GITHUB_TOKEN does not trigger
          # further `pull_request`-event workflow runs (a GitHub Actions
          # restriction), so required status checks would otherwise never
          # start and permanently block the merge. workflow_dispatch is
          # exempt from that restriction, so explicitly kick CI on the branch.
          gh workflow run ci.yml --repo "$GITHUB_REPOSITORY" --ref "$branch" || \
            echo "::warning::Could not auto-trigger CI on $branch — trigger ci.yml manually before merging."
          if gh pr merge "$pr_url" --merge --auto 2>/dev/null; then
            echo "Auto-merge queued for $pr_url."
          else
            echo "::warning::Opened $pr_url but could not auto-merge (auto-merge may be disabled) — merge it manually to finish the sync."
          fi
          exit 0
